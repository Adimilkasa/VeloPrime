    <g transform="translate(580 420)">
      <rect x="0" y="60" rx="44" width="520" height="140" fill="url(#car)"/>
      <rect x="96" y="0" rx="54" width="320" height="120" fill="#DCE6F1"/>
      <circle cx="130" cy="210" r="36" fill="#8A8F98" opacity="0.35"/>
      <circle cx="410" cy="210" r="36" fill="#8A8F98" opacity="0.35"/>
    </g>

    <g transform="translate(930 470)" opacity="0.92">
      <rect x="0" y="56" rx="40" width="460" height="128" fill="#C8D6E7"/>
      <rect x="86" y="0" rx="48" width="292" height="112" fill="#D8E3F0"/>
      <circle cx="116" cy="194" r="33" fill="#8A8F98" opacity="0.30"/>
      <circle cx="360" cy="194" r="33" fill="#8A8F98" opacity="0.30"/>
    </g>

    <g transform="translate(280 480)" opacity="0.92">
      <rect x="0" y="56" rx="40" width="460" height="128" fill="#C8D6E7"/>
      <rect x="86" y="0" rx="48" width="292" height="112" fill="#D8E3F0"/>
      <circle cx="116" cy="194" r="33" fill="#8A8F98" opacity="0.30"/>
      <circle cx="360" cy="194" r="33" fill="#8A8F98" opacity="0.30"/>
    </g>
