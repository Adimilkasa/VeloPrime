<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF1F8"/>
      <stop offset="55%" stop-color="#F7F8FA"/>
      <stop offset="100%" stop-color="#EEF1F5"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9D6E5"/>
      <stop offset="50%" stop-color="#B8C7D8"/>
      <stop offset="100%" stop-color="#D8E2EE"/>
